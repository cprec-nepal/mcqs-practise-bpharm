<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MCQ Master | CPREC Nepal</title>
  <style>
    /* --- MODERN CSS VARIABLES & RESET --- */
    :root {
      --primary: #6366f1; /* Indigo */
      --primary-dark: #4f46e5;
      --secondary: #ec4899; /* Pink */
      --bg-gradient-start: #e0c3fc;
      --bg-gradient-end: #8ec5fc;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.6);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
      --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
      --radius: 20px;
      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: var(--font-family);
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Background Animation Blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: -1;
      opacity: 0.6;
      animation: float 10s infinite ease-in-out;
    }
    .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #c084fc; animation-delay: 0s; }
    .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #60a5fa; animation-delay: 2s; }
    .blob-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #f472b6; animation-delay: 4s; opacity: 0.4; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -20px); }
    }

    /* --- HEADER --- */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 50; padding: 1rem 0;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .header-content {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand {
      font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- MAIN LAYOUT --- */
    main { 
      flex: 1; width: 100%; max-width: 1200px; margin: 2rem auto; 
      padding: 0 1.5rem; position: relative; z-index: 10; 
    }
    
    /* SIDEBAR LAYOUT CSS */
    main.quiz-layout {
      display: grid;
      grid-template-columns: 300px 1fr; 
      gap: 2rem;
      align-items: start;
    }
    
    #step-filter.sidebar-mode {
      position: sticky;
      top: 100px; 
      margin-bottom: 0; 
    }

    @media (max-width: 850px) {
      main.quiz-layout { grid-template-columns: 1fr; }
      #step-filter.sidebar-mode { position: relative; top: 0; margin-bottom: 2rem; order: -1; }
    }

    .section-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
    
    /* --- FORM ELEMENTS --- */
    .input-group { margin-bottom: 1.2rem; }
    input[type="email"], input[type="text"], select {
      width: 100%; padding: 0.8rem 1rem;
      border: 2px solid transparent; background: rgba(255, 255, 255, 0.6);
      border-radius: 12px; font-size: 0.95rem;
      transition: all 0.2s; color: var(--text-main);
    }
    input:focus, select:focus {
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

    /* --- BUTTONS --- */
    button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; border: none; padding: 0.8rem 1.5rem;
      border-radius: 10px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(99, 102, 241, 0.4); }
    button:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    button.secondary { background: white; color: var(--text-main); border: 2px solid #e2e8f0; box-shadow: none; }
    button.secondary:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }

    button.btn-finish { background: linear-gradient(135deg, var(--secondary), #db2777); box-shadow: 0 4px 10px rgba(236, 72, 153, 0.4); }
    button.btn-finish:hover { box-shadow: 0 6px 15px rgba(236, 72, 153, 0.5); }

    .actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }

    /* --- QUIZ UI --- */
    .progress-container { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
    
    .q-stem { font-weight: 700; font-size: 1.15rem; margin-bottom: 1.5rem; line-height: 1.5; color: var(--text-main); }
    
    /* Option Styles */
    .opt-item { 
      display: flex; align-items: center; padding: 1rem; 
      border: 2px solid transparent; border-radius: 12px; margin-bottom: 0.8rem; 
      cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.6);
      font-weight: 500; 
    }
    .opt-item:hover:not(.disabled) { border-color: var(--primary); background: #fff; transform: scale(1.01); }
    
    .opt-marker { 
      width: 30px; height: 30px; background: #e2e8f0; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; 
      margin-right: 15px; font-weight: 700; font-size: 0.85rem; color: var(--text-muted);
      flex-shrink: 0;
    }
    
    /* State Classes */
    .opt-item.selected { border-color: var(--primary); background: #eef2ff; }
    .opt-item.selected .opt-marker { background: var(--primary); color: white; }
    
    .opt-item.correct { border-color: var(--success); background: #ecfdf5; }
    .opt-item.correct .opt-marker { background: var(--success); color: white; }
    
    .opt-item.wrong { border-color: var(--error); background: #fef2f2; opacity: 0.8; }
    .opt-item.wrong .opt-marker { background: var(--error); color: white; }
    
    .opt-item.disabled { pointer-events: none; cursor: default; }

    /* Feedback Block */
    .feedback-box {
      margin-top: 1.5rem;
      padding: 1.2rem;
      border-radius: 12px;
      background: #f8fafc;
      border-left: 5px solid var(--primary);
      animation: slideUpFade 0.3s ease-out;
    }

    /* Navigation Bar */
    .nav-controls { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(0,0,0,0.05);
    }
    .nav-controls button { flex: 1; margin: 0 0.5rem; max-width: 150px; }
    .nav-controls .btn-finish { flex: 1.5; max-width: 250px; font-size: 1rem; }

    /* --- MODALS & EXTRAS --- */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box { background: white; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); transform: scale(0.9); transition: transform 0.3s; text-align: center; }
    .modal-overlay.active .modal-box { transform: scale(1); }

    /* History Table */
    .history-table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: rgba(255,255,255,0.5); border-radius: 12px; overflow: hidden; }
    .history-table th, .history-table td { padding: 12px 16px; text-align: left; font-size: 0.9rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .history-table th { background: rgba(255,255,255,0.8); color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; }

    /* Animations */
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    
    .shake { animation: shake 0.3s ease-in-out; }
    .hidden { display: none !important; } 
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div id="toast-container"></div>
  <header>
    <div class="header-content">
      <div class="brand">MCQ<span>Master</span></div>
      <div id="user-display" class="hidden" style="font-size: 0.85rem; font-weight: 600; background: white; padding: 0.4rem 1rem; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);"></div>
    </div>
  </header>

  <main>
    <!-- 1. Verification Step -->
    <section id="step-verify" class="section-card">
      <h2>👋 Welcome Back</h2>
      <p style="margin-top:-0.5rem; color: var(--text-muted); margin-bottom: 2rem;">Please verify your email to start the quiz.</p>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="student@example.com" />
      </div>
      <button id="btn-send-code" style="width: 100%;">Send Verification Code</button>
    </section>

    <!-- 2. Filter Step (Dashboard / Sidebar) -->
    <section id="step-filter" class="section-card hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="font-size:1.3rem; margin:0;">📚 Setup</h2>
        <button class="secondary" style="padding:0.4rem 1rem; font-size:0.85rem;" onclick="showHistory()">📊 History</button>
      </div>
      
      <div class="row">
        <div class="input-group">
          <label for="faculty">Faculty</label>
          <select id="faculty"><option value="">Loading...</option></select>
        </div>
        <div class="input-group">
          <label for="level">Level</label>
          <select id="level"><option value="">Any Level</option></select>
        </div>
      </div>
      
      <div class="actions" style="flex-direction:column;">
        <button id="btn-play" disabled style="width:100%; margin-bottom:0.5rem;">🚀 Start Quiz</button>
        <button id="btn-view" class="secondary" disabled style="width:100%;">👁️ View List</button>
      </div>
    </section>

    <!-- 2.5 History View -->
    <section id="view-history" class="section-card hidden">
      <div class="actions" style="margin-bottom: 1rem;">
        <button id="btn-back-filter" class="secondary">← Back</button>
      </div>
      <h3>My History</h3>
      <div style="overflow-x: auto;">
        <table class="history-table">
          <thead><tr><th>Date</th><th>Faculty</th><th>Score</th><th>Total</th><th>Result</th></tr></thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </section>

    <!-- 3. Play Mode -->
    <section id="mode-play" class="section-card hidden">
      <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
      
      <div style="display:flex; justify-content:space-between; margin-bottom:1rem; color:var(--text-muted); font-weight:600; font-size:0.85rem;">
        <span id="q-counter">Q 1/10</span>
        <span id="score-tracker" style="color:var(--primary);">Score: 0</span>
      </div>
      
      <div id="play-area"></div>
      
      <div class="nav-controls">
        <button id="btn-prev" class="secondary">← Prev</button>
        <button id="btn-finish" class="btn-finish">✓ Finish</button>
        <button id="btn-next">Next →</button>
      </div>
    </section>

    <!-- 4. View Mode -->
    <section id="mode-view" class="section-card hidden">
      <div class="actions" style="margin-bottom: 1rem;"><button id="btn-back-filter-main" class="secondary">← Back to Setup</button></div>
      <div id="view-list"></div>
    </section>
  </main>

  <!-- Verification Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title" style="margin-top:0;">Check Inbox</h3>
      <p style="color:var(--text-muted); margin-bottom: 1.5rem;">We sent a code to <b id="modal-email-display"></b>.</p>
      <div class="input-group">
        <input type="text" id="verify-code" placeholder="123456" maxlength="6" style="letter-spacing: 4px; text-align: center; font-weight: 700;" />
      </div>
      <button id="btn-verify" style="width:100%">Verify</button>
      <button id="btn-cancel-modal" class="secondary" style="width:100%; margin-top:0.5rem;">Cancel</button>
    </div>
  </div>

  <script>
    // UPDATED API URL
    const API_URL = "https://script.google.com/macros/s/AKfycbzwEvUtuaCbSQYy7gX0FI7KLweLr-7hH64re2akW0jmlm6kImRDtRCoaWJJIWH8o2JLvA/exec";

    const state = { 
      email: '', verified: false, 
      faculties: [], levels: [], 
      mcqs: [], 
      currentQIndex: 0, 
      answers: {},      
      score: 0, 
      currentFaculty: '', currentLevel: '' 
    };

    const $ = id => document.getElementById(id);
    const els = {
      email: $('email'), btnSend: $('btn-send-code'),
      stepVerify: $('step-verify'), stepFilter: $('step-filter'), viewHistory: $('view-history'),
      faculty: $('faculty'), level: $('level'), 
      btnPlay: $('btn-play'), btnView: $('btn-view'),
      modePlay: $('mode-play'), modeView: $('mode-view'),
      playArea: $('play-area'), viewList: $('view-list'),
      progressBar: $('progress-bar'), qCounter: $('q-counter'), scoreTracker: $('score-tracker'),
      btnPrev: $('btn-prev'), btnNext: $('btn-next'), btnFinish: $('btn-finish'),
      modalOverlay: $('modal-overlay'), modalEmail: $('modal-email-display'),
      verifyCode: $('verify-code'), btnVerify: $('btn-verify'), btnCancelModal: $('btn-cancel-modal'),
      btnBackFilter: $('btn-back-filter'), btnBackFilterMain: $('btn-back-filter-main'), 
      historyBody: $('history-body'), userDisplay: $('user-display')
    };

    /* --- UTILITIES --- */
    function showToast(msg, type = 'info') {
      const container = $('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
      toast.innerHTML = `<span style="font-size:1.1rem">${icon}</span> <span style="margin-left:8px;">${msg}</span>`;
      toast.style.cssText = "background:white; padding:1rem; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); border-left:5px solid " + (type==='error'?'#ef4444':type==='success'?'#10b981':'#6366f1') + "; display:flex; align-items:center; margin-bottom:10px; animation: slideUpFade 0.3s;";
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ROBUST FETCH FOR GAS
    async function fetchJSON(url) {
      try { 
        const res = await fetch(url, { 
          method: 'GET',
          redirect: 'follow',
          cache: 'no-store' 
        });
        const text = await res.text();
        // Regex to extract JSON from GAS response which might be wrapped in text/html
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) return JSON.parse(jsonMatch[0]);
        return JSON.parse(text);
      } catch (e) { 
        console.error(e); showToast("Connection Error", "error"); 
        return { success: false }; 
      }
    }

    /* --- AUTH --- */
    els.btnSend.onclick = async () => {
      const email = els.email.value.trim(); 
      if (!email) return showToast("Enter email", "error");
      els.btnSend.disabled = true; els.btnSend.textContent = "Sending...";
      const res = await fetchJSON(`${API_URL}?type=sendCode&email=${encodeURIComponent(email)}`);
      els.btnSend.disabled = false; els.btnSend.textContent = "Send Verification Code";
      if (res.success) { state.email = email; els.modalEmail.textContent = email; els.modalOverlay.classList.add('active'); els.verifyCode.focus(); } 
      else showToast(res.message, "error");
    };

    els.btnVerify.onclick = async () => {
      const code = els.verifyCode.value.trim(); 
      if (!code) return showToast("Enter code", "error");
      els.btnVerify.disabled = true;
      const res = await fetchJSON(`${API_URL}?type=verifyCode&email=${encodeURIComponent(state.email)}&code=${encodeURIComponent(code)}`);
      els.btnVerify.disabled = false;
      if (res.success) { showToast("Verified!", "success"); closeModal(); completeVerification(); } 
      else { showToast(res.message, "error"); els.verifyCode.classList.add('shake'); setTimeout(()=>els.verifyCode.classList.remove('shake'), 500); }
    };
    els.btnCancelModal.onclick = closeModal; 
    function closeModal() { els.modalOverlay.classList.remove('active'); }

    function completeVerification() {
      state.verified = true; 
      els.stepVerify.classList.add('hidden'); 
      els.stepFilter.classList.remove('hidden');
      els.userDisplay.textContent = state.email; els.userDisplay.classList.remove('hidden'); 
      document.querySelector('main').classList.add('quiz-layout');
      els.stepFilter.classList.add('sidebar-mode');
      loadFilters();
    }

    /* --- FILTERS --- */
    async function loadFilters() {
      const res = await fetchJSON(`${API_URL}?type=getFilters`);
      if (res.success) {
        // Handle nested 'data' structure from backend
        const payload = res.data || res;
        state.faculties = payload.subjects || []; 
        state.levels = payload.colleges || []; 
        els.faculty.innerHTML = '<option value="">Select Faculty...</option>' + state.faculties.map(s => `<option value="${s}">${s}</option>`).join('');
        els.level.innerHTML = '<option value="">Any Level</option>' + state.levels.map(c => `<option value="${c}">${c}</option>`).join('');
      }
    }

    function toggleActionButtons() { const ok = !!els.faculty.value; els.btnPlay.disabled = !ok; els.btnView.disabled = !ok; }
    els.faculty.addEventListener('change', toggleActionButtons);
    els.level.addEventListener('change', toggleActionButtons);

    /* --- HISTORY --- */
    async function showHistory() {
      els.modePlay.classList.add('hidden');
      els.modeView.classList.add('hidden');
      els.viewHistory.classList.remove('hidden');
      
      const res = await fetchJSON(`${API_URL}?type=getMyScores&email=${state.email}`);
      els.historyBody.innerHTML = '';
      if(res.success && res.scores.length) {
        const sorted = res.scores.sort((a,b) => new Date(b.date) - new Date(a.date));
        els.historyBody.innerHTML = sorted.map(s => `
          <tr>
            <td>${s.date}</td><td>${s.subject}</td><td>${s.score}</td><td>${s.total}</td>
            <td><span style="padding:2px 8px; border-radius:4px; background:${s.percentage>=80?'#dcfce7':'#f1f5f9'}; font-weight:700;">${s.percentage}%</span></td>
          </tr>`).join('');
      } else {
        els.historyBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem;">No history found.</td></tr>';
      }
    }
    els.btnBackFilter.onclick = () => { els.viewHistory.classList.add('hidden'); };

    /* --- QUIZ LOGIC --- */
    async function getFilteredQuestions() {
      const res = await fetchJSON(`${API_URL}?type=getMCQs`);
      // Handle nested 'data' structure
      const all = (res.data && res.data.mcqs) ? res.data.mcqs : (res.mcqs || []); 
      const fac = els.faculty.value, lvl = els.level.value;
      return all.filter(q => q.subject === fac && (lvl ? q.college === lvl : true));
    }

    els.btnPlay.onclick = async () => {
      const qs = await getFilteredQuestions(); 
      if (!qs.length) return showToast("No questions found.", "error");
      
      state.mcqs = qs; state.currentQIndex = 0; state.answers = {}; state.score = 0;
      state.currentFaculty = els.faculty.value; state.currentLevel = els.level.value;
      
      els.stepFilter.classList.remove('hidden'); 
      els.viewHistory.classList.add('hidden');
      els.modeView.classList.add('hidden');
      els.modePlay.classList.remove('hidden'); 
      
      renderQuestion();
      window.scrollTo(0,0);
    };

    function renderQuestion() {
      const q = state.mcqs[state.currentQIndex];
      if (!q) return;

      const savedAns = state.answers[state.currentQIndex];
      let html = `
        <div class="q-stem">
          <span style="color:var(--primary)">Q${state.currentQIndex + 1}.</span>
          ${q.q}
        </div>
        <div>
      `;

      q.options.forEach((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        const isSelected = savedAns === letter;
        const isCorrect = q.answer === letter;

        let cls = "opt-item";
        if (savedAns !== undefined) {
          cls += " disabled"; 
          if (isCorrect) cls += " correct";
          if (isSelected && !isCorrect) cls += " wrong";
        } else if (isSelected) {
          cls += " selected";
        }

        html += `
          <div class="${cls}" onclick="selectAnswer('${letter}')">
            <div class="opt-marker">${letter}</div>
            <div>${opt}</div>
          </div>
        `;
      });

      html += `</div>`;

      // Feedback Logic
      if (savedAns !== undefined) {
        let feedbackText = "";
        if (savedAns === q.answer) {
          feedbackText = "Correct answer!";
        } else {
          feedbackText = "Incorrect answer.";
        }

        html += `
          <div class="feedback-box">
            <div style="font-weight:700; margin-bottom:4px; color:var(--primary);">Explanation:</div>
            <div style="font-size:0.95rem; color:var(--text-main);">${feedbackText}</div>
            ${q.explanation ? `<div style="margin-top:8px; color:var(--text-muted); font-size:0.9rem; line-height:1.4;">${q.explanation}</div>` : ""}
          </div>
        `;
      }

      els.playArea.innerHTML = html;

      const total = state.mcqs.length;
      els.progressBar.style.width = `${((state.currentQIndex + 1) / total) * 100}%`;
      els.qCounter.textContent = `Question ${state.currentQIndex + 1} / ${total}`;
      els.scoreTracker.textContent = `Score: ${state.score}`;

      els.btnPrev.disabled = state.currentQIndex === 0;
      if (state.currentQIndex === total - 1) { els.btnNext.classList.add('hidden'); } 
      else { els.btnNext.classList.remove('hidden'); els.btnNext.disabled = savedAns === undefined; }
    }

    window.selectAnswer = (letter) => {
      const qIndex = state.currentQIndex;
      if (state.answers[qIndex] !== undefined) return; 
      
      state.answers[qIndex] = letter;
      const q = state.mcqs[qIndex];
      
      if (letter === q.answer) state.score++;
      
      renderQuestion(); 
    };

    els.btnNext.onclick = () => { if (state.currentQIndex < state.mcqs.length - 1) { state.currentQIndex++; renderQuestion(); } };
    els.btnPrev.onclick = () => { if (state.currentQIndex > 0) { state.currentQIndex--; renderQuestion(); } };

    els.btnFinish.onclick = async () => {
      const answeredCount = Object.keys(state.answers).length;
      const total = state.mcqs.length;
      if (!confirm(`You have answered ${answeredCount} out of ${total} questions. Finish?`)) return;

      const percentage = Math.round((state.score / total) * 100);
      
      // Send all details to backend
      await fetchJSON(`${API_URL}?type=saveScore&email=${state.email}&subject=${state.currentFaculty}&college=${state.currentLevel}&total=${total}&score=${state.score}&percentage=${percentage}`);
      
      showHistory();
    };

    /* --- VIEW MODE --- */
    els.btnView.onclick = async () => {
      const qs = await getFilteredQuestions(); if (!qs.length) return showToast("No questions found.", "error");
      state.mcqs = qs; renderViewMode(); 
      els.stepFilter.classList.remove('hidden'); els.modePlay.classList.add('hidden'); els.modeView.classList.remove('hidden'); 
    };
    function renderViewMode() {
      els.viewList.innerHTML = state.mcqs.map((q, i) => `
        <div class="q-card" style="margin-bottom:1.5rem; padding:1.5rem; background:rgba(255,255,255,0.5); border-radius:12px;">
          <div class="q-stem" style="font-size:1rem"><span style="color:var(--primary)">Q${i+1}.</span> ${q.q}</div>
          <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem;">Faculty: <b>${q.subject}</b></div>
          <div>${q.options.map((opt, idx) => {
            const letter = String.fromCharCode(65+idx);
            const isCorrect = letter === q.answer;
            return `<div style="padding:0.5rem; ${isCorrect?'color:#166534; font-weight:600;':''}">${letter}. ${opt} ${isCorrect?'✓':''}</div>`;
          }).join('')}</div>
        </div>`).join('');
    }
    els.btnBackFilterMain.onclick = () => { els.modeView.classList.add('hidden'); };

  </script>
</body>
</html>
